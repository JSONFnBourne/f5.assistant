            // Event handler when selected api doc changes
            function onChangeApi(obj) {
                var url = obj.value;

                var selected = obj.options[obj.selectedIndex];
                var section = selected.innerText;
                var component = selected.dataset.component;

                var location = new URL(window.location);
                if (location.searchParams.get("section") != section ||
                        location.searchParams.get("component") != component) {
                    location.searchParams.set("section", section);
                    if (component) {
                        location.searchParams.set("component", component);
                    }
                    location.hash = "";
                    window.history.pushState(
                        {idx: obj.selectedIndex, url: url},
                        document.title,
                        location.href
                    );
                }

                Redoc.init(url);
            }

            window.addEventListener("popstate", function (event) {
                if (!event.state) {
                    return;
                }

                var $select = document.getElementById("api_links");
                $select.selectedIndex = event.state.idx;
                Redoc.init(event.state.url);
            });

            //Finds the desired parent. if it doesn't exist, creates it
            function getParent(rootElement, component, section) {
                if (!component) {
                    return rootElement;
                }
                else {
                    var label;
                    if (component !== null) {
                        label = component + " - " + section;
                    } else {
                        label = section;
                    }
                    var id = "f5_api_links_" + label;
                    var $optionGroup = document.getElementById(id);

                    if (!$optionGroup) {
                        $optionGroup = document.createElement("optgroup");
                        $optionGroup.setAttribute("id", id);
                        $optionGroup.setAttribute("label", label);
                        rootElement.appendChild($optionGroup);
                    }

                    return $optionGroup;
                }
            }

            // Apis added to select box
            function initializePage (apiList) {
                var searchParams = (new URL(window.location)).searchParams;
                var initialPage = searchParams.get("section");
                var initialComponent = searchParams.get("component");
                var initialSpec;
                var fallbackSpec;

                // Get the select element
                var $select = document.getElementById("api_links");

                for (var i = 0; i < apiList.length; i++) {
                    var $option = document.createElement("option");
                    $option.setAttribute("value", apiList[i].url);
                    $option.innerText = apiList[i].name;
                    if (apiList[i].component) {
                        $option.dataset.component = apiList[i].component;
                    }

                    $parent = getParent($select, apiList[i].component, apiList[i].section);
                    $parent.appendChild($option);

                    if (apiList[i].name == initialPage &&
                            (apiList[i].component == null || apiList[i].component == initialComponent)) {
                        initialSpec = $option;
                    } else if ((apiList[i].name == "f5-partition") || apiList[i].name == "f5-disk-usage-threshold") {
                        // load a small api doc first
                        fallbackSpec = $option;
                    }
                }

                var spec = initialSpec ? initialSpec : fallbackSpec;
                $select.selectedIndex = spec.index;
                window.history.replaceState(
                    {idx: spec.index, url: spec.value},
                    document.title,
                    window.location.href
                );
                Redoc.init(spec.value);
            }

            initializePage(apis);

        </script>
